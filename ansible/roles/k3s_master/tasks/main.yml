---
- name: "Create K3s directory"
  file:
    path: "{{ config_dir }}"
    state: directory
    mode: '0755'

- name: "Copy K3s conf"
  template:
    src: config.yaml.j2
    dest: "{{ config_dir }}/config.yaml"
    mode: '0644'

- name: ".kub dir"
  file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    mode: '0755'

- name: "Installe master"
  shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION={{ version }} \
    sh -s - server \
    --config {{ config_dir }}/config.yaml
  args:
    creates: /usr/local/bin/k3s

- name: "Waiting k3s"
  wait_for:
    path: "{{ token_file }}"
    state: present
    timeout: 60

- name: "Get node toekn"
  slurp:
    src: "{{ token_file }}"
  register: k3s_token

- name: "Set toekn"
  set_fact:
    k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

- name: "Add k3s to PATH"
  file:
    src: /usr/local/bin/k3s
    dest: /usr/bin/k3s
    state: link

#WARN ADD REGEX for sudo path

- name: "Wait node"
  shell: k3s kubectl get nodes
  register: nodes
  until: "'Ready' in nodes.stdout"
  retries: 20
  delay: 10

- name: "Copy conf to ec2"
  copy:
    src: "{{ kubeconfig }}"
    dest: /home/ec2-user/.kube/config
    remote_src: yes
    owner: ec2-user
    mode: '0600'

- name: "Install helm"
  shell: |
    curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  ignore_errors: true

- name: "symlink helm"
  file:
    src: /usr/local/bin/helm
    dest: /usr/bin/helm
    state: link
    force: yes
    follow: false

- name: "add helm repo"
  shell: |
    /usr/local/bin/helm repo add hashicorp https://helm.releases.hashicorp.com
    /usr/local/bin/helm repo add elastic https://helm.elastic.co
    /usr/local/bin/helm repo add grafana https://grafana.github.io/helm-charts
    /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    /usr/local/bin/helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml


#WARN FAIRE LA CHART HELM ET DEGAGER LES --SET
- name: "Lauch Ingress-nginx"
  command: >
    /usr/local/bin/helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx
    --create-namespace
    --set controller.config.enable-modsecurity=true
    --set controller.config.enable-owasp-modsecurity-crs=true
    --set controller.config.modsecurity-snippet="SecRuleEngine On"
    --set controller.allowSnippetAnnotations=true
    --wait
    --timeout 120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: "Copy app chart to master"
  copy:
    src: "{{ playbook_dir }}/../helm/app/"
    dest: /tmp/gartic-app/
    mode: '0644'

- name: "Create ECR image pull secret"
  shell: |
    TOKEN=$(aws ecr get-login-password --region eu-north-1)
    /usr/local/bin/kubectl create secret docker-registry ecr-secret \
      --docker-server=437836833311.dkr.ecr.eu-north-1.amazonaws.com \
      --docker-username=AWS \
      --docker-password=$TOKEN \
      --namespace=default \
      --dry-run=client -o yaml | \
    /usr/local/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: "Deploy app Go via Helm"
  command: >
    /usr/local/bin/helm upgrade --install gartic-app /tmp/gartic-app
    --namespace default
    --wait
    --timeout 120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
