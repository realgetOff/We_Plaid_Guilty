grafana:
  enabled: false

alertmanager:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: true

prometheus:
  serviceAccount:
    create: true
    name: prometheus
    automountServiceAccountToken: true

  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: gartic-grafana

    dnsPolicy: ClusterFirstWithHostNet

    podMetadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/role: "prometheus-role"
        vault.hashicorp.com/agent-inject-secret-tls: "pki/issue/prometheus-pki"
        vault.hashicorp.com/agent-inject-template-tls: |
          {{`{{ with pkiCert "pki/issue/prometheus-pki" "common_name=prometheus.monitoring.svc.cluster.local" "ttl=24h" }}`}}
          {{`{{ .Cert }}{{ .CA }}{{ .Key }}`}}
          {{`{{ end }}`}}

    additionalScrapeConfigs:
      - job_name: 'node-exporter'
        scheme: https
        tls_config:
          cert_file: /vault/secrets/tls
          key_file: /vault/secrets/tls
          ca_file: /vault/secrets/tls
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - monitoring
            selectors:
              - role: pod
                label: "app.kubernetes.io/name=prometheus-node-exporter"
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_host_ip]
            target_label: __address__
            replacement: $1:9100
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      - job_name: 'gartic-app'
        scheme: https
        tls_config:
          cert_file: /vault/secrets/tls
          key_file: /vault/secrets/tls
          ca_file: /vault/secrets/tls
        static_configs:
          - targets:
              - 'gartic-app.app.svc.cluster.local:8080'
