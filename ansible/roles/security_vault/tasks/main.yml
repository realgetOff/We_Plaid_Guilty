---
- name: "Template vault values"
  template:
    src: "{{ playbook_dir }}/../helm/values/vault.yaml.j2"
    dest: /tmp/vault-values.yaml
    mode: '0644'

- name: "Install Vault via Helm"
  command: >
    /usr/local/bin/helm upgrade --install vault hashicorp/vault
    --namespace vault
    --create-namespace
    --values /tmp/vault-values.yaml
    --wait
    --timeout 120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: "Set vault api url"
  set_fact:
    vault_api_url: "http://127.0.0.1:30820"

- name: "Wait for Vault API"
  uri:
    url: "{{ vault_api_url }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 501, 503]
  register: _result
  until: _result.status != -1
  retries: 10
  delay: 2
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Check init of Vault"
  uri:
    url: "{{ vault_api_url }}/v1/sys/init"
    method: GET
  register: vault_init_status
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Init Vault"
  uri:
    url: "{{ vault_api_url }}/v1/sys/init"
    method: POST
    body_format: json
    body:
      recovery_shares: "{{ vault_recovery_shares }}"
      recovery_threshold: "{{ vault_recovery_threshold }}"
    status_code: [200]
  when: not vault_init_status.json.initialized
  register: vault_init_result
  no_log: true
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Set active root token"
  set_fact:
    active_root_token: "{{ vault_init_result.json.root_token if (vault_init_result is not skipped and vault_init_result.json is defined) else vault_root_token }}"
  no_log: true

- name: "Vérification de la présence du token"
  fail:
    msg: "active_root_token est vide — secrets.yml absent ou init échouée."
  when: active_root_token == "" or active_root_token is none

- name: "Verify vault pass file presence"
  become: false
  stat:
    path: "{{ vault_password_file }}"
  delegate_to: localhost
  register: pass_file
  failed_when: not pass_file.stat.exists
  when: not vault_init_status.json.initialized

- name: "Root token to file"
  copy:
    content: |
      vault_root_token: "{{ vault_init_result.json.root_token }}"
    dest: "{{ vault_secrets_file }}"
  delegate_to: localhost
  become: false
  when: not vault_init_status.json.initialized
  no_log: true

- name: "Encrypt secrets file"
  command: >
    ansible-vault encrypt {{ vault_secrets_file }}
    --vault-password-file {{ vault_password_file }}
  delegate_to: localhost
  become: false
  when: not vault_init_status.json.initialized

- name: "Vault initialization done"
  debug:
    msg: "Vault initialisé — secrets.yml chiffré"
  when: not vault_init_status.json.initialized

- name: "Check if KV v2 is enabled"
  uri:
    url: "{{ vault_api_url }}/v1/sys/mounts/secret"
    method: GET
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    status_code: [200, 404, 400]
  register: kv_status
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Enable KV v2"
  uri:
    url: "{{ vault_api_url }}/v1/sys/mounts/secret"
    method: POST
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    body_format: json
    body:
      type: "kv"
      options:
        version: "2"
    status_code: [200, 204]
  when: kv_status.status == 404 or kv_status.status == 400
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Feed Vault for db"
  uri:
    url: "{{ vault_api_url }}/v1/secret/data/db/config"
    method: POST
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    body_format: json
    body:
      data:
        db_password: "{{ db_password }}"
        db_user: "{{ db_user }}"
        db_name: "{{ db_name }}"
    status_code: [200, 204]
  no_log: true
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Feed Vault for app"
  uri:
    url: "{{ vault_api_url }}/v1/secret/data/app/config"
    method: POST
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    body_format: json
    body:
      data:
        db_host: "172.17.0.1"
        db_port: "5432"
        db_password: "{{ db_password }}"
        db_user: "{{ db_user }}"
        db_name: "{{ db_name }}"
        jwt_secret: "{{ app_jwt_secret }}"
        api_key: "{{ app_api_key }}"
        client_id: "{{ client_id }}"
        client_secret: "{{ client_secret }}"
    status_code: [200, 204]
  no_log: true
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Feed Vault for elk"
  uri:
    url: "{{ vault_api_url }}/v1/secret/data/elk/config"
    method: POST
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    body_format: json
    body:
      data:
        elastic_password: "{{ elastic_pass }}"
        kibana_password: "{{ kibana_pass }}"
        encrypt_key: "{{ elk_encrypt_key }}"
    status_code: [200, 204]
  no_log: true
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface

- name: "Feed Vault for grafana"
  uri:
    url: "{{ vault_api_url }}/v1/secret/data/grafana/config"
    method: POST
    headers:
      X-Vault-Token: "{{ active_root_token }}"
    body_format: json
    body:
      data:
        grafana_password: "{{ grafana_pass }}"
    status_code: [200, 204]
  no_log: true
  # checkov:skip=CKV2_ANSIBLE_1:Vault API uses HTTP on loopback interface
