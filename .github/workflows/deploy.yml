name: Deploy

on:
  push:
    branches: [main, feature/infra]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - deploy
          - destroy
          - destroy-full

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | \
          docker login --username AWS --password-stdin \
          437836833311.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./go-server
          platforms: linux/arm64
          push: true
          tags: |
            437836833311.dkr.ecr.eu-north-1.amazonaws.com/gartic-trans-app:${{ github.sha }}
            437836833311.dkr.ecr.eu-north-1.amazonaws.com/gartic-trans-app:latest

      - name: Deploy
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          DEPLOY_USER: ${{ github.actor }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > ~/.vault_pass
          chmod 600 ~/.vault_pass
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            make destroy
          elif [ "${{ github.event.inputs.action }}" = "destroy-full" ]; then
            make destroy-full
          else
            make deploy-ci DEPLOY_USER=$DEPLOY_USER
          fi
