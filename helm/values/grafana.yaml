          # tlsCACert: $__file{/vault/secrets/tls}
          # tlsClientCert: $__file{/vault/secrets/tls}
          # tlsClientKey: $__file{/vault/secrets/tls}

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboardsConfigMaps:
  default: "grafana-custom-dashboard"

# dashboards: {}
  # default:
    # kubernetes-cluster:
      # gnetId: 15520
      # revision: 10
      # datasource: Prometheus

persistence:
  enabled: false

dnsPolicy: ClusterFirstWithHostNet
