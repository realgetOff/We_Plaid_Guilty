---
- name: "Setup AlmaLinux"
  hosts: alma
  become: true
  vars:
    team_ssh_keys:
      - name: kazibuya
        key: "ssh-rsa  namichel@1G4.42angouleme.fr"
      - name: CI
        key: "ssh-rsa  namichel@1F5.42angouleme.fr"
      - name: malignantsystem
        key: "ssh-rsa  pmilner-@2F3.42angouleme.fr"
  tasks:

    - name: "Update OS"
      dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: "EPEL"
      dnf:
        name: "epel-release"
        state: present

    - name: "Get packages"
      dnf:
        name:
          - "git"
          - "htop"
          - "curl"
          - "wget"
          - "tar"
          - "pip"
        state: present

    - name: "Rename"
      hostname:
        name: gartic-server

    - name: "Proccess Security_OS"
      include_role:
        name: security_os

    - name: "Proccess Docker Install"
      include_role:
        name: docker_install

    - name: "Load Vault secrets"
      include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      # ignore_errors: true
      when: lookup('fileglob', playbook_dir + '/secrets.yml') != []

    - name: "Vault"
      include_role:
        name: security_vault
# 
    # - name: "GO Server"
      # include_role:
        # name: go-server

    - name: "Gathering Facts"
      debug:
        msg:
          - "Name: {{ ansible_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Total uptime: {{ (ansible_uptime_seconds / 3600) | round(2) }} heures"
          - "Deploy by: {{ deploy_user | default('manual') }}"
