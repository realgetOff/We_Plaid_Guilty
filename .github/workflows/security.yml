name: Security

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: true
          output_format: cli,junitxml
          output_file_path: console

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: '**/results_junitxml.xml'

      - name: Publish Checkov Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/results_junitxml.xml'
          detailed_summary: true
          check_name: "Checkov Security Report"

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          output: trivy-results.txt
          exit-code: 0
          scanners: vuln,misconfig,secret

      # - name: Upload Trivy results
        # uses: actions/upload-artifact@v4
        # if: always()
        # with:
          # name: trivy-report
          # path: trivy-results.xml

      - name: Publish Trivy Report
        # uses: mikepenz/action-junit-report@v4
        if: always()
        # with:
          # report_paths: trivy-results.xml
          # detailed_summary: true
          # check_name: "Trivy Security Report"
        run: |
          echo "Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Trivy scan failed > no results" >> $GITHUB_STEP_SUMMARY
          fi


  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    # steps:
      # - uses: actions/checkout@v4
        # with:
          # fetch-depth: 0
# 
      # - name: Set up Docker Buildx
        # uses: docker/setup-buildx-action@v3
# 
      # - name: Build SonarQube stage
        # run: |
          # docker build \
            # --target sonarqube \
            # --build-arg GO_ARCH=amd64 \
            # -t sonar-scan \
            # ./go-server
# 
      # - name: Run SonarQube scan
        # run: |
          # docker run --rm \
            # -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            # sonar-scan \
            # sonar-scanner \
              # -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
              # -Dsonar.scm.disabled=true

  gosec:
    name: Gosec Scan
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Check files
        run: find go-server/backend -name "*.go" | head -20
      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run Gosec
        working-directory: go-server/backend
        run: gosec ./... 2>&1 | tee gosec-results.txt || true
      - name: Publish Gosec Report
        if: always()
        run: |
          echo "Gosec Scan Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat go-server/backend/gosec-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
