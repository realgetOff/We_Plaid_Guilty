---
- name: "Setup instance"
  hosts: all
  become: true
  vars:
    team_ssh_keys:
      - name: kazibuya
        key: "ssh-rsa  namichel@1G4.42angouleme.fr"
      - name: CI
        key: "ssh-rsa  namichel@1F5.42angouleme.fr"
      - name: malignantsystem
        key: "ssh-rsa  pmilner-@2F3.42angouleme.fr"
      - name: getoff
        key: "ssh-rsa  mforest-@1A7.42angouleme.fr"
  tasks:

    - name: "Update OS"
      dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: "EPEL"
      dnf:
        name: "epel-release"
        state: present

    - name: "Get packages"
      dnf:
        name:
          - "git"
          - "htop"
          - "curl"
          - "wget"
          - "tar"
          - "pip"
          - "awscli"
        state: present


    - name: "Proccess Security_OS"
      include_role:
        name: security_os
      tags: security_os

    - name: "Proccess Docker Install"
      include_role:
        name: docker_install
      tags: docker_install

- name: "Master node"
  hosts: MASTER
  become: true
  tasks:
    - name: "Rename"
      hostname:
        name: gartic-master

    - name: "Load Vault secrets"
      include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      # ignore_errors: true
      when: lookup('fileglob', playbook_dir + '/secrets.yml') != []

    - name: "K3s master"
      include_role:
        name: k3s_master
        apply:
          tags: k3s_master
      tags: k3s_master

    - name: "Vault"
      include_role:
        name: security_vault
        apply:
          tags: security_vault
      tags: security_vault

    - name: "start DB"
      include_role:
        name: db
        apply:
          tags: db
      tags: db

- name: "Worker nodes"
  hosts: WORKERS
  become: true
  tasks:
    - name: "Get K3s token from master"
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
      delegate_to: "{{ groups['MASTER'][0] }}"

    - name: "Set K3s token"
      set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

    - name: "Rename w1(elk)"
      hostname:
        name: gartic-elk
      when: inventory_hostname == groups['WORKERS'][0]

    - name: "Rename w2(grafana)"
      hostname:
        name: gartic-grafana
      when: inventory_hostname == groups['WORKERS'][1]

    - name: "k3s worker"
      include_role:
        name: k3s_worker
        apply:
          tags: k3s_worker
      tags: k3s_worker
