apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gartic-app
  annotations:
    nginx.ingress.kubernetes.io/proxy-ssl-name: "gartic-app.app.svc.cluster.local"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-modsecurity-crs: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # nginx.ingress.kubernetes.io/server-snippet: |
      # proxy_ssl_certificate /vault/secrets/tls;
      # proxy_ssl_certificate_key /vault/secrets/tls;
      # proxy_ssl_trusted_certificate /vault/secrets/tls;
      # proxy_ssl_verify on;
      # proxy_ssl_verify_depth 2;
    # nginx.ingress.kubernetes.io/modsecurity-snippet: |
      # SecRuleEngine On
      # SecRequestBodyAccess On
      # SecAuditLog /var/log/modsec_audit.log

spec:
  ingressClassName: nginx
  rules:
    # - host: {{ .Values.ingress.host }}
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gartic-app
                port:
                  number: {{ .Values.service.port }}
