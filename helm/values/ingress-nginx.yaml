controller:
  serviceAccount:
    name: nginx-pki
    create: true

  shareProcessNamespace: true

  podAnnotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-init-first: "true"
    vault.hashicorp.com/role: "nginx-role"
    vault.hashicorp.com/agent-inject-secret-tls: "pki/issue/nginx-pki"
    vault.hashicorp.com/agent-inject-template-tls: |
      {{`{{ with pkiCert "pki/issue/nginx-pki" "common_name=app.transcendance.local" "ttl=24h" }}`}}
      {{`{{ .Cert }}{{ .CA }}{{ .Key }}`}}
      {{`{{ end }}`}}
    vault.hashicorp.com/agent-inject-command-tls: |
      kill -HUP $(pgrep -x nginx | head -1)

  config:
    enable-modsecurity: "true"
    enable-owasp-modsecurity-crs: "true"
    ssl-protocols: "TLSv1.2 TLSv1.3"
    server-snippet: |
      ssl_certificate /vault/secrets/tls;
      ssl_certificate_key /vault/secrets/tls;

  allowSnippetAnnotations: true

  service:
    type: NodePort
    nodePorts:
      http: "30080"
      https: "30443"

  nodeSelector:
    kubernetes.io/hostname: gartic-master
