---
- name: "Setup instance"
  hosts: all
  become: true
  vars:
    team_ssh_keys:
      - name: kazibuya
        key: "ssh-rsa  namichel@1G4.42angouleme.fr"
      - name: CI
        key: "ssh-rsa  namichel@1F5.42angouleme.fr"
      - name: malignantsystem
        key: "ssh-rsa  pmilner-@2F3.42angouleme.fr"
      - name: getoff
        key: "ssh-rsa  mforest-@1A7.42angouleme.fr"
      - name: lvira66
        key: "ssh-rsa  lviravon@3A7.42angouleme.fr"
  tasks:

    - name: "Update OS"
      dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: "EPEL"
      dnf:
        name: "epel-release"
        state: present

    - name: "Get packages"
      dnf:
        name:
          - "git"
          - "htop"
          - "curl"
          - "wget"
          - "tar"
          - "pip"
          - "awscli"
        state: present


    - name: "Proccess Security_OS"
      include_role:
        name: security_os
      tags: security_os

    - name: "Proccess Docker Install"
      include_role:
        name: docker_install
      tags: docker_install

- name: "Master node"
  hosts: MASTER
  become: true
  tasks:
    - name: "Rename"
      hostname:
        name: gartic-master

    - name: "Load Vault secrets"
      include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      # ignore_errors: true
      when: lookup('fileglob', playbook_dir + '/secrets.yml') != []

    - name: "K3s master"
      include_role:
        name: k3s_master
        apply:
          tags: k3s_master
      tags: k3s_master

    - name: "Vault"
      include_role:
        name: security_vault
        apply:
          tags: security_vault
      tags: security_vault

    - name: "start DB"
      include_role:
        name: db
        apply:
          tags: db
      tags: db

    - name: "Wait for Vault Agent Injector"
      shell: |
        /usr/local/bin/kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=vault-agent-injector \
          -n vault --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy app Go"
      shell: |
        /usr/local/bin/helm upgrade --install gartic-app /tmp/gartic-app \
          --namespace app \
          --timeout 120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Launch Ingress-nginx"
      command: >
        /usr/local/bin/helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --namespace ingress-nginx
        --values /tmp/ingress-nginx-values.yaml
        --timeout 120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml



- name: "Worker nodes"
  hosts: WORKERS
  become: true
  tasks:
    - name: "wiat node-token from Master"
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        state: present
        timeout: 60 #j'ai eu un crash par manque de temps
      delegate_to: "{{ groups['MASTER'][0] }}" #il doit pas le chercher de lui-meme

    - name: "Get K3s token from master"
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
      delegate_to: "{{ groups['MASTER'][0] }}"

    - name: "Set K3s token"
      set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

    - name: "Rename w1(elk)"
      hostname:
        name: gartic-elk
      when: inventory_hostname == groups['WORKERS'][0]

    - name: "Rename w2(grafana)"
      hostname:
        name: gartic-grafana
      when: inventory_hostname == groups['WORKERS'][1]

    - name: "k3s worker"
      include_role:
        name: k3s_worker
        apply:
          tags: k3s_worker
      tags: k3s_worker

    - name: "Trust K3s network interfaces"
      firewalld:
        zone: trusted
        interface: "{{ item }}"
        permanent: yes
        immediate: yes
        state: enabled
      loop:
        - cni0
        - flannel-wg
      ignore_errors: true


- name: "Monitoring"
  hosts: MASTER
  become: true
  tasks:
    - name: "Wait for workers to join"
      shell: |
        /usr/local/bin/kubectl wait node \
          --for=condition=ready \
          --all \
          --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    - name: "Create namespace monitoring"
      shell: |
        /usr/local/bin/kubectl create namespace monitoring \
          --dry-run=client -o yaml | \
        /usr/local/bin/kubectl apply -f -
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Label namespace monitoring"
      shell: |
        /usr/local/bin/kubectl label namespace monitoring \
          vault-injection=enabled --overwrite
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Copy node-exporter values"
      copy:
        src: "{{ playbook_dir }}/../helm/values/node-exporter.yaml"
        dest: /tmp/node-exporter-values.yaml
        mode: '0644'

    - name: "Apply node-exporter web-config ConfigMap"
      copy:
        src: "{{ playbook_dir }}/../helm/values/node-exporter-web-config.yaml"
        dest: /tmp/node-exporter-web-config.yaml
        mode: '0644'

    - name: "Create web-config ConfigMap"
      shell: |
        /usr/local/bin/kubectl apply -f /tmp/node-exporter-web-config.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy node-exporter"
      shell: |
        /usr/local/bin/helm upgrade --install node-exporter \
          prometheus-community/prometheus-node-exporter \
          --namespace monitoring \
          --values /tmp/node-exporter-values.yaml \
          --timeout 120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Copy prometheus values"
      copy:
        src: "{{ playbook_dir }}/../helm/values/prometheus.yaml"
        dest: /tmp/prometheus-values.yaml
        mode: '0644'

    - name: "Copy grafana values"
      copy:
        src: "{{ playbook_dir }}/../helm/values/grafana.yaml"
        dest: /tmp/grafana-values.yaml
        mode: '0644'

    - name: "Copy Grafana dashboard JSON"
      copy:
        src: "{{ playbook_dir }}/../helm/values/dashboard/DASHBOARD_GRAFANA.json"
        dest: /tmp/DASHBOARD_GRAFANA.json
        mode: '0644'

    - name: "Create Grafana dashboard ConfigMap"
      shell: |
        /usr/local/bin/kubectl create configmap grafana-custom-dashboard \
          --from-file=DASHBOARD_GRAFANA.json=/tmp/DASHBOARD_GRAFANA.json \
          -n monitoring --dry-run=client -o yaml | \
        /usr/local/bin/kubectl apply -f -
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy Prometheus"
      shell: |
        /usr/local/bin/helm upgrade --install prometheus \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --values /tmp/prometheus-values.yaml \
          --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy Grafana"
      shell: |
        /usr/local/bin/helm upgrade --install grafana \
          grafana/grafana \
          --namespace monitoring \
          --values /tmp/grafana-values.yaml \
          --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml



- name: "Logging"
  hosts: MASTER
  become: true
  tasks:
    - name: "Load Vault secrets"
      include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      when: lookup('fileglob', playbook_dir + '/secrets.yml') != []

    - name: "Create namespace logging"
      shell: |
        /usr/local/bin/kubectl create namespace logging \
          --dry-run=client -o yaml | \
        /usr/local/bin/kubectl apply -f -
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Label namespace logging for Vault injection"
      shell: |
        /usr/local/bin/kubectl label namespace logging \
          vault-injection=enabled --overwrite
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Create Elasticsearch credentials secret"
      shell: |
        /usr/local/bin/kubectl create secret generic elasticsearch-credentials \
          --from-literal=username=elastic \
          --from-literal=password="{{ elastic_pass }}" \
          --namespace logging \
          --dry-run=client -o yaml | \
        /usr/local/bin/kubectl apply -f -
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      no_log: true

    - name: "Copy elasticsearch values"
      copy:
        src: "{{ playbook_dir }}/../helm/values/elasticsearch.yaml"
        dest: /tmp/elasticsearch-values.yaml
        mode: '0644'

    - name: "Copy kibana values"
      template:
        src: "{{ playbook_dir }}/../helm/values/kibana.yaml"
        dest: /tmp/kibana-values.yaml
        mode: '0644'
          #TODO: template -> copy

    - name: "Copy filebeat values"
      copy:
        src: "{{ playbook_dir }}/../helm/values/filebeat.yaml"
        dest: /tmp/filebeat-values.yaml
        mode: '0644'

    - name: "Deploy Elasticsearch"
      shell: |
        /usr/local/bin/helm upgrade --install elasticsearch \
          elastic/elasticsearch \
          --namespace logging \
          --values /tmp/elasticsearch-values.yaml \
          --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy Kibana"
      shell: |
        /usr/local/bin/helm upgrade --install kibana \
          elastic/kibana \
          --namespace logging \
          --values /tmp/kibana-values.yaml \
          --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: "Deploy Filebeat"
      shell: |
        /usr/local/bin/helm upgrade --install filebeat \
          elastic/filebeat \
          --namespace logging \
          --values /tmp/filebeat-values.yaml \
          --timeout 120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
