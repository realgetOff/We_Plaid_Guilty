apiVersion: apps/v1
kind: Deployment
metadata:
  name: gartic-app
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gartic-app
  template:
    metadata:
      labels:
        app: gartic-app
      annotations:
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-appconfig: "secret/data/app/config"
        vault.hashicorp.com/agent-inject-file-appconfig: "app/config"
        vault.hashicorp.com/agent-inject-template-appconfig: |
          {{`{{ with secret "secret/data/app/config" }}`}}
          DB_HOST={{`{{ .Data.data.db_host }}`}}
          DB_PORT={{`{{ .Data.data.db_port }}`}}
          DB_PASSWORD={{`{{ .Data.data.db_password }}`}}
          DB_USER={{`{{ .Data.data.db_user }}`}}
          DB_NAME={{`{{ .Data.data.db_name }}`}}
          JWT_SECRET={{`{{ .Data.data.jwt_secret }}`}}
          API_KEY={{`{{ .Data.data.api_key }}`}}
          {{`{{ end }}`}}
        vault.hashicorp.com/agent-inject-secret-tls: "pki/issue/app-pki"
        vault.hashicorp.com/agent-inject-template-tls: |
          {{`{{ with pkiCert "pki/issue/app-pki" "common_name=gartic-app.app.svc.cluster.local" "ttl=24h" }}`}}
          {{`{{ .Cert }}`}}
          {{`{{ .CA }}`}}
          {{`{{ .Key }}`}}
          {{`{{ end }}`}}
    spec:
      serviceAccountName: gartic-app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: gartic-app
          # checkov:skip=CKV_K8S_14:Image tag managed by CI/CD pipeline via SHA
          # checkov:skip=CKV_K8S_43:Image digest managed by CI/CD pipeline
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          env:
            - name: VAULT_ADDR
              value: "{{ .Values.vault.addr }}:{{ .Values.vault.port }}"
            - name: DB_HOST
              value: "{{ .Values.db.host }}"
            - name: DB_PORT
              value: "{{ .Values.db.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vault-secrets
          emptyDir:
            medium: Memory
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
